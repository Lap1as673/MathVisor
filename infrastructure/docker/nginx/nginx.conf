# Пользователь, от которого работает nginx
user nginx;

# Количество worker процессов (автоматически = количество ядер)
worker_processes auto;

# Ошибки логов
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# Максимальное количество открытых файлов
worker_rlimit_nofile 65535;

events {
    # Максимальное количество соединений на одного worker
    worker_connections 4096;
    
    # Принимать много соединений сразу
    multi_accept on;
    
    # Использовать эффективный метод обработки соединений
    use epoll;
}

http {
    # Подключаем MIME типы
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Формат логов
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # Логи доступа
    access_log /var/log/nginx/access.log main buffer=32k flush=5s;

    # Базовые настройки
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    
    # Таймауты
    keepalive_timeout 65;
    keepalive_requests 100;
    client_body_timeout 30;
    client_header_timeout 30;
    send_timeout 30;
    
    # Максимальный размер тела запроса
    client_max_body_size 100M;
    client_body_buffer_size 128k;
    
    # Hash sizes
    server_names_hash_bucket_size 128;
    server_names_hash_max_size 1024;
    types_hash_max_size 2048;
    types_hash_bucket_size 128;
    
    # Подключаем дополнительные конфиги
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/includes/*.conf;
}
