# Upstream для бэкенда
upstream backend {
    # Балансировка по кругу (round-robin)
    server backend:8000 max_fails=3 fail_timeout=30s weight=1;
    
    # Если будет несколько бэкендов:
    # server backend2:8000 max_fails=3 fail_timeout=30s weight=2;
    
    keepalive 32;
}

# Прокси для API
location /api/ {
    # Прокси на бэкенд
    proxy_pass http://backend/api/;
    
    # Заголовки
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    
    # Таймауты
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    
    # Буферизация
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;
    proxy_temp_file_write_size 8k;
    
    # Подключаем CORS
    include /etc/nginx/includes/cors.conf;
}

# Документация API
location /docs {
    proxy_pass http://backend/docs;
    proxy_set_header Host $host;
}

location /redoc {
    proxy_pass http://backend/redoc;
    proxy_set_header Host $host;
}

location /openapi.json {
    proxy_pass http://backend/openapi.json;
    proxy_set_header Host $host;
}
