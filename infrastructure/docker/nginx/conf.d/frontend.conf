# Upstream для фронтенда
upstream frontend {
    server frontend:80 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# Основной сервер
server {
    listen 80;
    server_name localhost;
    
    # Корневая директория для статики
    root /usr/share/nginx/html;
    index index.html;
    
    # Логи для этого сервера
    access_log /var/log/nginx/frontend_access.log main buffer=32k flush=5s;
    error_log /var/log/nginx/frontend_error.log warn;
    
    # Включаем GZIP сжатие
    include /etc/nginx/includes/gzip.conf;
    
    # Включаем CORS
    include /etc/nginx/includes/cors.conf;
    
    # Для SPA - все запросы кроме /api/ отправляем на фронтенд
    location / {
        try_files $uri $uri/ /index.html;
        
        # Кэширование статики
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
    
    # Страницы ошибок
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
